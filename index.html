<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bunker Digital SCADA v31.9.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #0b0e14; --bg-panel: #161b22; --text-main: #f0f6fc; --text-muted: #8b949e; --border-color: #30363d; --accent-blue: #1f6feb; --accent-green: #3fb950; --accent-red: #da3633; }
        body { background: var(--bg-body); color: var(--text-main); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .app-container { display: none; padding: 10px; flex-direction: column; gap: 10px; height: 100vh; }
        .active-app { display: flex; }
        .kpi-row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
        .kpi-card { background: var(--bg-panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        .master-layout { display: grid; grid-template-columns: 1fr 340px; gap: 15px; flex: 1; min-height: 0; }
        .chart-box { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; }
        input, select { background: #0d1117; color: white; border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; }
        .btn-sys { cursor: pointer; background: #21262d; color: white; border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 6px; }
    </style>
</head>
<body>
<div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center;">
    <button onclick="loginWithGoogle()" style="padding:20px;">ENTRAR AL BÚNKER</button>
</div>
<div class="app-container" id="reportZone">
    <div style="display:flex; justify-content:space-between;">
        <h2>BUNKER SCADA V31.9.6</h2>
        <div>
            <button class="btn-sys" onclick="triggerSync()">🔄 SYNC</button>
            <button class="btn-sys" onclick="enviarReporteTelegram()">🚀 TELEGRAM</button>
            <button class="btn-sys" onclick="logout()">SALIR</button>
        </div>
    </div>
    <div class="kpi-row">
        <div class="kpi-card">Sueldo<br><input type="text" id="inputSueldo" oninput="formatearEntradaNumerica(this); actualizarDashboard();" style="width:100px;"></div>
        <div class="kpi-card">Fijos<br>$<span id="txtTotalFijos">0</span></div>
        <div class="kpi-card">Variables<br>$<span id="txtTotalOtros">0</span></div>
        <div class="kpi-card">Balance<br>$<span id="txtSaldo">0</span></div>
        <div class="kpi-card">Periodo<br><select id="navMesConceptual" onchange="aplicarCicloAlSistema()"><option value="3">Abril</option><option value="4">Mayo</option></select></div>
        <div class="kpi-card" style="display:none;"><select id="navAnio"><option value="2026">2026</option></select><span id="navRangoBadge"></span></div>
    </div>
    <div class="master-layout">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="chart-box">
                <h5>Burn-Down Zoom</h5>
                <div style="height:250px;"><canvas id="chartBurnDown"></canvas></div>
                <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                    IN: <input type="range" id="sliderIn" min="0" max="30" value="0" oninput="hacerZoomGrafico(this.value, document.getElementById('sliderFin').value)">
                    OUT: <input type="range" id="sliderFin" min="0" max="30" value="30" oninput="hacerZoomGrafico(document.getElementById('sliderIn').value, this.value)">
                    <div style="background:#21262d; padding:5px;">Tramo: <span id="txtGastoTramo" style="color:var(--accent-red)">$0</span></div>
                    <div style="background:#21262d; padding:5px;">Promedio: <span id="txtPromedioZoom" style="color:var(--accent-green)">$0</span></div>
                </div>
            </div>
            <div style="background:var(--bg-panel); flex:1; overflow-y:auto; border:1px solid var(--border-color);">
                <table style="width:100%; border-collapse:collapse; font-size:0.8rem;">
                    <thead><tr style="text-align:left; color:var(--accent-blue);"><th>FECHA</th><th>NOMBRE</th><th>CATEGORÍA</th><th>MONTO</th></tr></thead>
                    <tbody id="listaDetalle"></tbody>
                </table>
            </div>
        </div>
        <div class="chart-box">
            <h5>Registro / Ajustes</h5>
            <input type="text" id="inputNombre" placeholder="Descripción" style="width:100%; margin-bottom:10px;">
            <input type="text" id="inputMonto" placeholder="Monto" oninput="formatearEntradaNumerica(this)" style="width:100%; margin-bottom:10px;">
            <select id="inputTipo" style="width:100%; margin-bottom:10px;"><option value="Gasto">Variable</option><option value="Gasto Fijo">Fijo</option><option value="Ingreso">Ingreso</option></select>
            <select id="inputCategoria" style="width:100%; margin-bottom:10px;"></select>
            <input type="datetime-local" id="inputFecha" style="width:100%; margin-bottom:10px;">
            <button onclick="agregarMovimiento()" style="width:100%; padding:10px; background:var(--accent-green); border:none; color:black; font-weight:bold;">GUARDAR</button>
        </div>
    </div>
</div>
<script src="motor.js"></script>
</body>
</html>
