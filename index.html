<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker Digital SCADA v7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #0b0e14; --bg-panel: #161b22; --bg-subpanel: #21262d; --text-main: #f0f6fc; --text-muted: #8b949e; --border-color: #30363d; --accent-blue: #1f6feb; --accent-green: #3fb950; --accent-red: #da3633; --accent-orange: #d29922; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.2s; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #login-screen { position: fixed; inset: 0; background: #0b0e14; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .app-container { display: none; padding: 10px; flex-direction: column; gap: 10px; height: 100vh; width: 100%; }
        .active-app { display: flex; }

        .master-layout { display: grid; grid-template-columns: 1fr 320px; gap: 12px; flex: 1; min-height: 0; }
        .left-col { display: flex; flex-direction: column; min-height: 0; }
        .right-col { display: flex; flex-direction: column; gap: 10px; }

        .grid-main-wrapper { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 10px; }
        .grid-container { flex: 1; overflow: auto; background: #0d1117; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { position: sticky; top: 0; background: var(--bg-panel); color: var(--accent-blue); padding: 10px; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); }

        #charts-grid-container { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; height: 250px; margin-top: 10px; }
        .chart-box { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; position: relative;}
        .chart-box h5 { margin: 0 0 8px 0; text-align: center; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; z-index: 10;}
        .canvas-container { flex: 1; position: relative; min-height: 0; }

        /* 🟢 ERGONOMÍA: CONTROLES INCORPORADOS COMO OVERLAYS (No ocupan espacio) 🟢 */
        .zoom-controls-overlay { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; gap: 10px; background: rgba(11, 14, 20, 0.8); padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); backdrop-filter: blur(5px); z-index: 20;}
        .kpi-overlay { position: absolute; top: 10px; left: 10px; background: rgba(11, 14, 20, 0.8); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 0.7rem; z-index: 20;}
        .kpi-overlay-right { position: absolute; top: 10px; right: 10px; background: rgba(11, 14, 20, 0.8); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-color); font-size: 0.7rem; z-index: 20;}

        .sidebar-panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        input, select { background: #0d1117; color: white; border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn-sys { cursor: pointer; background: var(--bg-subpanel); color: white; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen"><button onclick="loginWithGoogle()" style="padding:20px; border-radius:12px; font-weight:bold; cursor:pointer;">ENTRAR AL BÚNKER SCADA</button></div>

    <div class="app-container" id="reportZone">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--accent-green); margin:0;">BUNKER DIGITAL SCADA V7.0</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-sys" onclick="triggerSync()">🔄 SYNC</button>
                <button class="btn-sys" onclick="enviarReporteTelegram()">🚀 TELEGRAM</button>
                <button class="btn-sys" onclick="logout()">🚪 SALIR</button>
            </div>
        </div>

        <div class="master-layout">
            <div class="left-col">
                <div class="grid-main-wrapper">
                    <div style="margin-bottom:10px; display:flex; gap:10px; align-items:center;">
                        <input type="text" id="inputBuscador" placeholder="🔍 Filtrar registros..." oninput="actualizarDashboard()" style="margin:0; width:300px;">
                        <select id="navMesConceptual" onchange="aplicarCicloAlSistema()" style="margin:0; width:150px;"><option value="3">Abril</option><option value="4">Mayo</option></select>
                        <div id="navRangoBadge" style="font-family:monospace; color:var(--accent-blue); font-weight:bold;"></div>
                    </div>
                    <div class="grid-container">
                        <table>
                            <thead><tr><th>FECHA</th><th>DESCRIPCIÓN</th><th>CATEGORÍA</th><th>MONTO</th></tr></thead>
                            <tbody id="listaDetalle"></tbody>
                        </table>
                    </div>
                </div>

                <div id="charts-grid-container">
                    <div class="chart-box">
                        <h5>Burn-Down & Zoom</h5>
                        <div class="kpi-overlay">Tramo: <b id="txtGastoTramo" style="color:var(--accent-red);">$0</b></div>
                        <div class="kpi-overlay-right">Promedio: <b id="txtPromedioZoom" style="color:var(--accent-orange);">$0</b></div>
                        
                        <div class="canvas-container" style="margin-bottom: 35px;"><canvas id="chartBurnDown"></canvas></div>
                        
                        <div class="zoom-controls-overlay">
                            <input type="range" id="sliderIn" min="0" max="30" value="0" style="margin:0;" oninput="hacerZoomGrafico(this.value, document.getElementById('sliderFin').value)">
                            <input type="range" id="sliderFin" min="0" max="30" value="30" style="margin:0;" oninput="hacerZoomGrafico(document.getElementById('sliderIn').value, this.value)">
                        </div>
                    </div>
                    <div class="chart-box"><h5>Pulso Semanal (Var.)</h5><div class="canvas-container"><canvas id="chartDiario"></canvas></div></div>
                    <div class="chart-box"><h5>Top Fugas</h5><div class="canvas-container"><canvas id="chartPareto"></canvas></div></div>
                    <div class="chart-box"><h5>Perfil Radar</h5><div class="canvas-container"><canvas id="chartRadar"></canvas></div></div>
                </div>
            </div>

            <div class="right-col">
                <div class="sidebar-panel">
                    <h4 style="color:var(--accent-blue); margin-top:0;">BALANCE REAL</h4>
                    <div style="font-size:2rem; font-weight:900;" id="txtSaldo">$0</div>
                    <div style="color:var(--text-muted); font-size:0.7rem; margin-top:5px;">PROYECTADO: <span id="txtProyectado"></span></div>
                </div>
                <div class="sidebar-panel">
                    <h4 style="margin-top:0;">REGISTRO MANUAL</h4>
                    <input type="hidden" id="editId">
                    <input type="text" id="inputNombre" placeholder="Descripción">
                    <input type="text" id="inputMonto" placeholder="Monto" oninput="formatearEntradaNumerica(this)">
                    <select id="inputTipo"><option value="Gasto">Gasto Variable</option><option value="Gasto Fijo">Gasto Fijo</option><option value="Ingreso">Ingreso</option></select>
                    <select id="inputCategoria"></select>
                    <input type="datetime-local" id="inputFecha">
                    <button class="btn-sys" onclick="agregarMovimiento()" style="width:100%; background:var(--accent-green); color:black; border:none;">GUARDAR REGISTRO</button>
                </div>
            </div>
        </div>
    </div>
    <script src="motor.js"></script>
    <select id="navAnio" style="display:none;"><option value="2026">2026</option></select>
</body>
</html>
