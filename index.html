<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunker Digital SCADA V14.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #030508; --bg-panel: #0d1117; --text-main: #e6edf3; --text-muted: #7d8590; --border-color: #21262d; --color-ingresos: #238636; --color-saldo: #2ea043; --color-edit: #d29922; --color-fuga: #ff5252; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }
        .app-container { display: none; padding: 10px; flex-direction: column; gap: 10px; max-width: 2560px; margin: 0 auto; }
        .app-container.active-app { display: flex; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .nav-panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--color-saldo); }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .kpi-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; border-top: 3px solid var(--border-color); }
        .kpi-card h4 { margin: 0; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .kpi-card .value { font-size: 1.2rem; font-weight: 900; font-family: monospace; display: flex; align-items: baseline; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; min-height: 250px; }
        .chart-box { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; position: relative; height: 260px; }
        .dual-core { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; min-height: 500px; margin-top: 10px; }
        .core-panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .core-header { padding: 10px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .data-grid { width: 100%; border-collapse: collapse; }
        .data-grid th { background: #161b22; padding: 10px; font-size: 0.7rem; text-align: left; position: sticky; top: 0; }
        .data-grid td { padding: 8px 10px; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); }
        select, input { background: #010409; color: white; border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; outline: none; }
        #login-screen { position: fixed; inset: 0; background: #030508; display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="text-align:center; padding:40px; background:#0d1117; border:1px solid #21262d; border-radius:12px;">
        <h2 style="color:#79c0ff;">BÚNKER SCADA</h2>
        <button onclick="loginWithGoogle()" style="margin-top:20px; padding:12px 24px; font-weight:bold; cursor:pointer;">INICIAR ENLACE</button>
    </div>
</div>

<div class="app-container" id="reportZone">
    <div class="header">
        <h2>BUNKER SCADA <span style="font-size:0.7rem; background:#1f6feb; padding:2px 5px; border-radius:3px;">V14.6</span></h2>
        <div id="cronos" style="font-family:monospace; color:var(--color-saldo);">--:--:--</div>
        <button onclick="logout()">LOGOUT</button>
    </div>

    <div class="nav-panel">
        <select id="navAnio" onchange="aplicarCicloAlSistema()">
            <option value="2025">2025</option><option value="2026" selected>2026</option>
        </select>
        <select id="navMesConceptual" onchange="aplicarCicloAlSistema()" style="color:var(--color-saldo); font-weight:bold;">
            <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3" selected>Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
        </select>
        <div id="navRangoBadge" style="color:#79c0ff; font-family:monospace; font-weight:bold;"></div>
    </div>

    <div class="kpi-row">
        <div class="kpi-card" style="border-top-color:#d29922;">
            <h4>PRESUPUESTO MENSUAL</h4>
            <div class="value"><span>$</span><input type="text" id="inputSueldo" placeholder="NO ASIGNADO" style="border:none; width:100%; background:transparent;"></div>
        </div>
        <div class="kpi-card"><h4>INGRESOS EXTRA</h4><div class="value" style="color:var(--color-saldo);">$<span id="txtTotalIngresos">0</span></div></div>
        <div class="kpi-card" style="border-top-color:var(--color-saldo);"><h4>BALANCE REAL</h4><div class="value">$<span id="txtSaldo">0</span></div></div>
        <div class="kpi-card" style="border-top-color:#79c0ff;"><h4>SALDO + TC</h4><div class="value" style="color:#79c0ff;">$<span id="txtProyectado">0</span></div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><h5>TRAYECTORIA (BURN-RATE)</h5><canvas id="chartBurnDown"></canvas></div>
        <div class="chart-box"><h5>PULSO VITAL</h5><canvas id="chartDiario"></canvas></div>
        <div class="chart-box"><h5>ESPECTRO CATEGÓRICO</h5><canvas id="chartPareto"></canvas></div>
        <div class="chart-box" style="border-color:#ff5252;"><h5>RADAR DEUDA TC</h5><canvas id="chartRadar"></canvas></div>
    </div>

    <div class="dual-core">
        <div class="core-panel">
            <div class="core-header"><span>FLUJO PRESENTE</span><button onclick="exportarDataLink()">📥 DATA-LINK</button></div>
            <div style="padding:5px;"><input type="text" id="inputBuscador" placeholder="🔍 Buscar..." oninput="actualizarDashboard()" style="width:100%;"></div>
            <table class="data-grid">
                <thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th style="text-align:right;">Monto</th><th style="text-align:center;">CMD</th></tr></thead>
                <tbody id="listaDetalle"></tbody>
            </table>
        </div>
        <div class="core-panel" style="border-color:rgba(255,82,82,0.3);">
            <div class="core-header" style="color:var(--color-fuga);"><span>MATRIZ TC</span><button onclick="cargarCSV_TC()">💳 INGESTAR</button></div>
            <div style="padding:10px; font-weight:bold;">DEUDA TOTAL: $<span id="txtTotalTC">0</span></div>
            <table class="data-grid">
                <thead><tr><th>Cuota</th><th>Comercio</th><th style="text-align:right;">Monto</th></tr></thead>
                <tbody id="listaDetalleTC"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="motor.js"></script>
</body>
</html>
