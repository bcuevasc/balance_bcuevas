<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunker App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-body: #0b0e14; --bg-panel: #161b22; --text-main: #f0f6fc; --text-muted: #8b949e; --border-color: #30363d; --color-ingresos: #1f6feb; --color-saldo: #3fb950; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 70px; }
        
        /* HEADER FIJO */
        .app-header { position: sticky; top: 0; background: var(--bg-panel); padding: 15px; border-bottom: 1px solid var(--border-color); z-index: 100; display:flex; justify-content:space-between; align-items:center;}
        .app-header h2 { margin: 0; font-size: 1.1rem; color: var(--color-saldo); }
        
        /* TARJETAS KPI (Resumen Rápido) */
        .kpi-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .kpi-card { background: var(--bg-panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .kpi-card h4 { margin: 0 0 5px 0; font-size: 0.7rem; color: var(--text-muted); }
        .kpi-card .value { margin: 0; font-size: 1.4rem; font-weight: 900; }
        
        /* CONTENEDOR DE TARJETAS DE GASTO */
        #listaMovilDetalle { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .mobile-card { background: var(--bg-panel); border-radius: 12px; padding: 15px; display: flex; align-items: center; border: 1px solid var(--border-color); }
        .mc-icon { font-size: 1.5rem; margin-right: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50%; }
        .mc-body { flex: 1; }
        .mc-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 3px; }
        .mc-subtitle { font-size: 0.7rem; color: var(--text-muted); }
        .mc-amount { font-family: monospace; font-weight: 900; font-size: 1.1rem; }

        /* FORMULARIO (Oculto por defecto) */
        #tab-add { display: none; padding: 20px; }
        input, select { width: 100%; padding: 12px; background: #0d1117; color: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; font-size: 1rem; }
        .btn-guardar { width: 100%; padding: 15px; background: #238636; color: white; border: none; font-weight: bold; border-radius: 8px; font-size: 1rem; }

        /* BOTTOM NAVIGATION BAR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px; padding-bottom: 25px; z-index: 1000; }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 0.7rem; font-weight: bold; padding: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--color-ingresos); }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 4px; }

        #login-screen { position: fixed; inset: 0; background: #0b0e14; display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body class="mobile-layout">

<div id="login-screen"><button onclick="loginWithGoogle()" style="padding:15px; font-size:1rem;">ENTRAR BÚNKER</button></div>

<div class="app-container" id="reportZone">
    <div class="app-header">
        <h2>BÚNKER MÓVIL</h2>
        <span id="user-display" style="font-size:0.7rem; color:var(--text-muted);"></span>
        <select id="navAnio" style="display:none;"><option value="2026" selected>2026</option></select>
        <select id="navMesConceptual" style="display:none;"><option value="3" selected>Abril</option></select>
    </div>

    <div id="tab-dash">
        <div class="kpi-container">
            <div class="kpi-card" style="border-color:var(--color-saldo)"><h4>Balance Real</h4><div class="value" style="color:var(--color-saldo)">$<span id="txtSaldo">0</span></div></div>
            <div class="kpi-card"><h4>Sueldo</h4><div class="value">$<input type="text" id="inputSueldo" style="border:none; background:transparent; font-size:1.4rem; font-weight:900; padding:0; margin:0;" onchange="guardarSueldoEnNube()"></div></div>
            <div class="kpi-card"><h4>Gastos Fijos</h4><div class="value" style="color:#ff5252">$<span id="txtTotalFijos">0</span></div></div>
            <div class="kpi-card"><h4>Variables</h4><div class="value" style="color:#ff9800">$<span id="txtTotalOtros">0</span></div></div>
        </div>
        <h4 style="margin-left:15px; color:var(--text-muted);">Últimos Movimientos</h4>
        <div id="listaMovilDetalle"></div>
    </div>

    <div id="tab-add">
        <h3 style="margin-top:0; color:var(--color-saldo);">NUEVO REGISTRO</h3>
        <input type="hidden" id="editId">
        <input type="datetime-local" id="inputFecha">
        <select id="inputTipo"><option value="Gasto">Gasto Variable</option><option value="Gasto Fijo">Gasto Fijo</option><option value="Ingreso">Ingreso</option></select>
        <select id="inputCategoria"><option value="Gastos Fijos (Búnker)">Gastos Fijos</option><option value="Dopamina & Antojos">Dopamina</option><option value="Alimentación & Supermercado">Alimentación</option><option value="Sin Categoría">Otros</option></select>
        <input type="text" id="inputNombre" placeholder="Descripción de la compra...">
        <input type="number" id="inputMonto" placeholder="$ Monto" style="font-size:1.5rem; font-weight:bold; color:var(--color-saldo);">
        <button id="btnGuardar" class="btn-guardar" onclick="agregarMovimiento()">GUARDAR TRANSACCIÓN</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('dash')"><i>📊</i>Radar</div>
        <div class="nav-item" onclick="switchTab('add')"><i>➕</i>Registro</div>
    </div>
</div>

<script>
    // Lógica Simple para Navegar entre pestañas en el celular
    function switchTab(tab) {
        document.getElementById('tab-dash').style.display = tab === 'dash' ? 'block' : 'none';
        document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(tab==='add') document.getElementById('inputFecha').value = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    }
</script>
<script src="motor.js"></script>
</body>
</html>
