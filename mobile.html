<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bunker Móvil HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #f0f6fc; --blue: #1f6feb; --orange: #ff9800; --red: #ff5252; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        .top-bar { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .hud { text-align: center; padding: 30px; font-size: 3.5rem; font-weight: 900; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .mobile-card { background: transparent; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .date-header { font-size: 0.7rem; font-weight: 900; color: #8b949e; padding: 20px 15px 5px; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(11,14,20,0.95); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #30363d; backdrop-filter: blur(10px); }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; background: var(--card); border: 1px solid #30363d; color: white; border-radius: 12px; font-size: 1rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center;"><button onclick="loginWithGoogle()" style="padding:20px; border-radius:15px; font-weight:bold;">AUTENTICAR BÚNKER</button></div>
    
    <div class="app-container" id="reportZone">
        <div class="top-bar"><b>SCADA MÓVIL V7.5</b><span id="user-display"></span></div>

        <div id="tab-dash" class="tab-content" style="display:block;">
            <div class="hud">$<span id="txtSaldo">0</span></div>
            <div id="listaMovilDetalle"></div>
        </div>

        <div id="tab-trend" class="tab-content">
            <h3 style="margin-top:0;">TELEMETRÍA</h3>
            <select onchange="document.querySelectorAll('.v-chart').forEach(v=>v.style.display='none'); document.getElementById(this.value).style.display='block';">
                <option value="vBD">📉 VELOCIDAD (BURN-DOWN)</option>
                <option value="vDI">📊 PULSO DIARIO (BARRAS)</option>
                <option value="vPA">📈 PARETO (TOP FUGAS)</option>
                <option value="vRA">💠 PERFIL (RADAR)</option>
            </select>

            <div id="vBD" class="v-chart" style="display:block;">
                <div style="height:250px;"><canvas id="chartBurnDown"></canvas></div>
                <div style="margin-top:15px; border-top:1px solid #30363d; padding-top:15px;">
                    <input type="range" id="sliderIn" min="0" max="30" value="0" oninput="hacerZoomGrafico(this.value, document.getElementById('sliderFin').value)">
                    <input type="range" id="sliderFin" min="0" max="30" value="30" oninput="hacerZoomGrafico(document.getElementById('sliderIn').value, this.value)">
                    <div style="display:flex; justify-content:space-around; margin-top:10px;">
                        <div style="text-align:center;">TRAMO<br><b id="txtGastoTramo">$0</b></div>
                        <div style="text-align:center;">PROMEDIO<br><b id="txtPromedioZoom">$0</b></div>
                    </div>
                </div>
            </div>
            <div id="vDI" class="v-chart" style="display:none; height:300px;"><canvas id="chartDiario"></canvas></div>
            <div id="vPA" class="v-chart" style="display:none; height:300px;"><canvas id="chartPareto"></canvas></div>
            <div id="vRA" class="v-chart" style="display:none; height:300px;"><canvas id="chartRadar"></canvas></div>
        </div>

        <div id="tab-add" class="tab-content">
            <h3>REGISTRO</h3>
            <input type="text" id="inputNombre" placeholder="¿Qué gastaste?">
            <input type="text" id="inputMonto" placeholder="Monto" oninput="formatearEntradaNumerica(this)">
            <select id="inputTipo"><option value="Gasto">Variable</option><option value="Gasto Fijo">Fijo</option><option value="Ingreso">Ingreso</option></select>
            <select id="inputCategoria"></select>
            <input type="datetime-local" id="inputFecha">
            <button onclick="agregarMovimiento()" style="width:100%; padding:20px; border-radius:12px; background:var(--accent-green); border:none; font-weight:bold;">REGISTRAR</button>
        </div>

        <nav class="bottom-nav">
            <div onclick="switchTabApp('dash')">📡 Radar</div>
            <div onclick="switchTabApp('trend')">📈 Tren</div>
            <div onclick="switchTabApp('add')">➕ Nuevo</div>
            <div onclick="triggerSync()">🔄 Sync</div>
        </nav>
    </div>

    <script>
        function switchTabApp(t) { 
            document.querySelectorAll('.tab-content').forEach(d => d.style.display='none');
            document.getElementById('tab-'+t).style.display='block';
            if(t==='trend') { setTimeout(()=>{ if(chartBD) chartBD.resize(); if(chartDiario) chartDiario.resize(); },10); }
        }
    </script>
    <script src="motor.js"></script>
    <div style="display:none;"><select id="navMesConceptual"><option value="3">3</option></select><select id="navAnio"><option value="2026">2026</option></select><span id="inputSueldo">3602505</span><span id="navRangoBadge"></span><span id="txtProyectado"></span></div>
</body>
</html>
