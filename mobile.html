<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bunker Móvil</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #f0f6fc; --dim: #8b949e; --blue: #1f6feb; --red: #ff5252; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .top-bar { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .hud { text-align: center; padding: 20px; font-size: 3rem; font-weight: 900; }
        #listaMovilDetalle { padding: 0 10px; }
        .mobile-card { background: transparent; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .date-header { font-size: 0.7rem; font-weight: 800; color: var(--dim); padding: 15px 10px 5px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(11,14,20,0.9); display: flex; justify-content: space-around; padding: 10px 0 30px; border-top: 1px solid #30363d; }
        .tab-content { display: none; padding: 20px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; background: var(--card); border: 1px solid #30363d; color: white; border-radius: 12px; }
    </style>
</head>
<body>
<div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center;"><button onclick="loginWithGoogle()">AUTENTICAR</button></div>
<div class="app-container" id="reportZone">
    <div class="top-bar"><b>BUNKER MÓVIL</b><span id="user-display"></span></div>
    <div id="tab-dash" class="tab-content" style="display:block;">
        <div class="hud">$<span id="txtSaldo">0</span></div>
        <div id="listaMovilDetalle"></div>
    </div>
    <div id="tab-trend" class="tab-content">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button onclick="document.getElementById('vBD').style.display='block'; document.getElementById('vP').style.display='none';" style="flex:1; padding:10px;">📉 BURN</button>
            <button onclick="document.getElementById('vP').style.display='block'; document.getElementById('vBD').style.display='none';" style="flex:1; padding:10px;">📊 PARETO</button>
        </div>
        <div id="vBD" class="chart-box">
            <div style="height:250px;"><canvas id="chartBurnDown"></canvas></div>
            <input type="range" id="sliderIn" min="0" max="30" value="0" oninput="hacerZoomGrafico(this.value, document.getElementById('sliderFin').value)">
            <input type="range" id="sliderFin" min="0" max="30" value="30" oninput="hacerZoomGrafico(document.getElementById('sliderIn').value, this.value)">
            <div style="display:flex; justify-content:space-around; margin-top:10px;">
                <div style="text-align:center;">Tramo<br><b id="txtGastoTramo">$0</b></div>
                <div style="text-align:center;">Promedio<br><b id="txtPromedioZoom">$0</b></div>
            </div>
        </div>
        <div id="vP" style="display:none; height:300px;"><canvas id="chartPareto"></canvas></div>
    </div>
    <div id="tab-add" class="tab-content">
        <input type="text" id="inputMonto" placeholder="Monto" oninput="formatearEntradaNumerica(this)">
        <input type="text" id="inputNombre" placeholder="Descripción">
        <select id="inputTipo"><option value="Gasto">Variable</option><option value="Gasto Fijo">Fijo</option></select>
        <select id="inputCategoria"></select>
        <input type="datetime-local" id="inputFecha">
        <button onclick="agregarMovimiento()" style="width:100%; padding:20px; background:var(--accent-green);">REGISTRAR</button>
    </div>
    <nav class="bottom-nav">
        <div onclick="switchTabApp('dash')">📡 Radar</div>
        <div onclick="switchTabApp('trend')">📈 Tren</div>
        <div onclick="switchTabApp('add')">➕</div>
        <div onclick="triggerSync()">☁️</div>
    </nav>
</div>
<script>
    function switchTabApp(t) { 
        document.querySelectorAll('.tab-content').forEach(d => d.style.display='none');
        document.getElementById('tab-'+t).style.display='block';
        if(t==='trend') { setTimeout(()=>{ if(chartBD) chartBD.resize(); },10); }
    }
</script>
<script src="motor.js"></script>
</body>
</html>
