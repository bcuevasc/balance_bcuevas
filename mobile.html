<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bunker Móvil V13.1 (Stable Base)</title>
    <link rel="apple-touch-icon" href="bunker-icon.png">
    <meta name="theme-color" content="#030508">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --bg-base: #030508; --bg-card: #0d1117; --text-main: #e6edf3; --text-dim: #7d8590; --accent-blue: #1f6feb; --accent-red: #ff5252; --border-subtle: #21262d; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 🟢 BLOQUEO DE DESBORDE DE SAFARI 🟢 */
        html, body { width: 100vw; min-height: 100vh; overflow-x: hidden; }
        body { background-color: var(--bg-base); color: var(--text-main); margin: 0; padding-bottom: 90px; }

        #login-screen { position: fixed; inset: 0; background: var(--bg-base); display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
        .top-bar { padding: max(20px, env(safe-area-inset-top)) 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px;} .brand-badge { background: linear-gradient(90deg, #1f6feb, #79c0ff); color: #fff; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-family: monospace;}

        .master-hud { text-align: center; padding: 10px 20px 25px 20px; width: 100%;}
        .hud-value { font-size: 3.5rem; font-weight: 900; font-family: monospace; }
        
        .tab-content { display: none; padding: 10px 15px; }
        .active-tab { display: block; }

        /* Gráficos en móvil */
        .swipe-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 0 20px 0; scrollbar-width: none; }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-card { flex: 0 0 90%; scroll-snap-align: center; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 15px; }

        .lista-contenedor { display: flex; flex-direction: column; gap: 8px; }
        .mobile-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 15px; display: flex; align-items: center; cursor: pointer; }
        .card-icon { font-size: 1.5rem; margin-right: 15px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(3, 5, 8, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border-subtle); display: flex; justify-content: space-around; align-items: center; padding: 10px 5px calc(15px + env(safe-area-inset-bottom)) 5px; z-index: 1000; }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 0.65rem; font-weight: 800; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--text-main); }
        .nav-fab { background: var(--accent-blue); color: #fff; width: 60px; height: 60px; border-radius: 30px; display: flex; justify-content: center; align-items: center; font-size: 2rem; margin: -30px 10px 0 10px; border: 4px solid var(--bg-base); cursor: pointer; }
        
        .terminal-form { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-subtle); }
        .terminal-form input, .terminal-form select { width: 100%; padding: 16px; margin-bottom: 12px; background: #161b22; color: white; border: 1px solid var(--border-subtle); border-radius: 8px; font-size: 1rem; outline: none; }
        .btn-sys { background: #161b22; color: white; border: 1px solid var(--border-subtle); padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="color:#79c0ff; font-size:2.5rem; font-weight:900; margin-bottom: 10px;">BÚNKER SCADA</h2>
    <p style="color:var(--text-dim); margin-bottom: 40px;">[ V13.1 MÓVIL STABLE ]</p>
    <button onclick="window.loginWithGoogle()" style="padding:18px 40px; border-radius:12px; font-weight:900; background: white; color: black; border: none; font-size: 1.1rem; cursor: pointer;">INICIAR ENLACE</button>
</div>

<div class="app-container" id="reportZone" style="display: none;">
    <div class="top-bar">
        <div class="brand">BÚNKER <span class="brand-badge">V13.1</span></div>
        <div style="font-weight: bold; font-size: 0.8rem; color: #2ea043;">ONLINE</div>
    </div>

    <div id="tab-dash" class="tab-content active-tab">
        <div class="master-hud">
            <div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing: 2px;">Saldo Disponible</div>
            <div class="hud-value">$<span id="txtSaldo">0</span></div>
        </div>

        <div class="swipe-container">
            <div class="swipe-card"><div style="text-align: center; font-size: 0.7rem; font-weight: bold; color: var(--text-dim); margin-bottom: 10px;">Trayectoria</div><div style="height:180px;"><canvas id="chartBurnDown"></canvas></div></div>
            <div class="swipe-card"><div style="text-align: center; font-size: 0.7rem; font-weight: bold; color: var(--text-dim); margin-bottom: 10px;">Diario</div><div style="height:180px;"><canvas id="chartDiario"></canvas></div></div>
        </div>

        <div style="padding: 10px 15px; font-size: 0.7rem; font-weight: bold; color: #1f6feb;">> MOVIMIENTOS RECIENTES</div>
        <div id="listaMovilDetalle" class="lista-contenedor"></div>
    </div>

    <div id="tab-add" class="tab-content">
        <h3 style="text-align: center; color: var(--text-dim);">INYECTAR DATOS</h3>
        <div class="terminal-form">
            <input type="text" id="inputMonto" placeholder="$ Monto" inputmode="numeric" oninput="window.formatearEntradaNumerica(this)" style="font-size: 2rem; font-weight: bold; text-align: center; color: #79c0ff; background: transparent; border: none; border-bottom: 2px solid #1f6feb; border-radius: 0;">
            <input type="text" id="inputNombre" placeholder="Descripción...">
            <select id="inputTipo"><option value="Gasto">Gasto Variable</option><option value="Gasto Fijo">Gasto Fijo</option><option value="Ingreso">Ingreso</option></select>
            <select id="inputCategoria"></select>
            <input type="datetime-local" id="inputFecha">
            <button onclick="window.agregarMovimiento()" style="width: 100%; padding: 18px; background: #1f6feb; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px;">GUARDAR</button>
        </div>
    </div>

    <div id="tab-settings" class="tab-content">
        <h3 style="text-align: center; color: var(--text-dim);">SISTEMA</h3>
        <button class="btn-sys" onclick="window.logout()" style="color:#ff5252; border-color:rgba(255,82,82,0.3);">🚪 DESCONECTAR</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTabApp('dash', this)">RADAR</div>
        <div class="nav-fab" onclick="switchTabApp('add', null)">+</div>
        <div class="nav-item" onclick="switchTabApp('settings', this)">SET</div>
    </div>
</div>

<script>
    function switchTabApp(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(d => { d.classList.remove('active-tab'); });
        document.getElementById('tab-' + tabId).classList.add('active-tab');
        if(element) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); element.classList.add('active'); }
        if (tabId === 'add') { let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); document.getElementById('inputFecha').value = now.toISOString().slice(0,16); }
        window.scrollTo(0,0);
    }
</script>
<script src="motor.js"></script>
</body>
</html>
