<style>
        :root { --bg-base: #030508; --bg-card: #0d1117; --bg-elevated: #161b22; --text-main: #e6edf3; --text-dim: #7d8590; --accent-blue: #1f6feb; --accent-green: #2ea043; --accent-red: #ff5252; --accent-orange: #d29922; --border-subtle: #21262d; --color-infra: #a371f7; --color-flota: #00bcd4; color-scheme: dark; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-base); background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 25px 25px; color: var(--text-main); margin: 0; padding-bottom: calc(90px + env(safe-area-inset-bottom)); overscroll-behavior-y: none; }

        #login-screen { position: fixed; inset: 0; background: var(--bg-base); display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
        .top-bar { padding: max(20px, env(safe-area-inset-top)) 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; display: flex; align-items: center; gap: 6px;}
        .brand-badge { background: linear-gradient(90deg, #1f6feb, #79c0ff); color: #fff; font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-family: monospace; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        .user-tag { color: var(--accent-green); background: rgba(46, 160, 67, 0.1); border: 1px solid rgba(46, 160, 67, 0.3); font-weight: 800; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; letter-spacing: 1px; box-shadow: 0 0 10px rgba(46, 160, 67, 0.2); }
        .master-hud { text-align: center; padding: 5px 20px 10px 20px; width: 100%; overflow: hidden;}
        .hud-value { font-size: clamp(2.2rem, 10vw, 3.5rem); font-weight: 900; letter-spacing: -1px; font-family: monospace; text-shadow: 0 0 20px rgba(31, 111, 235, 0.3); transition: transform 0.3s; word-break: break-all; line-height: 1;}
        .hud-value.danger { color: var(--accent-red); text-shadow: 0 0 30px rgba(255, 82, 82, 0.3); }

        .slave-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 15px; margin-bottom: 10px; }
        .slave-pill { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 6px 10px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; overflow: hidden;}
        .slave-pill::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--border-subtle); }
        .slave-pill.red::before { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }
        .slave-pill.orange::before { background: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }
        .slave-pill.purple::before { background: var(--color-infra); box-shadow: 0 0 10px var(--color-infra); }
        .slave-pill.cyan::before { background: var(--color-flota); box-shadow: 0 0 10px var(--color-flota); }

        /* =======================================================
           📱 UI MÓVIL V14.9 - TARJETAS NATIVAS & TOUCH TARGETS
           ======================================================= */
        .lista-contenedor { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
        
        .mobile-card { 
            background: linear-gradient(145deg, var(--bg-elevated) 0%, var(--bg-card) 100%) !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important; 
            border-radius: 16px !important; 
            padding: 16px 14px !important; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease !important; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03) !important; 
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .mobile-card:active { transform: scale(0.96) !important; box-shadow: 0 2px 5px rgba(0,0,0,0.5) !important; }

        .mobile-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--border-subtle); transition: all 0.3s ease;
        }
        .mobile-card.is-ingreso::before { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
        .mobile-card.is-fuga::before { background: var(--accent-red); box-shadow: 0 0 12px var(--accent-red); }
        .mobile-card.is-neutro::before { background: var(--accent-orange); box-shadow: 0 0 12px var(--accent-orange); }

        .mc-icon {
            width: 44px; height: 44px; background: rgba(0,0,0,0.4); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05); font-size: 1.4rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .mc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .mc-title { font-weight: 800; font-size: 0.95rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.3px; line-height: 1.2; margin-bottom: 3px; }
        .mc-subtitle { font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}

        .mc-amount { font-family: monospace; font-weight: 900; font-size: 1.15rem; text-align: right; flex-shrink: 0; }

        .date-header { padding-left: 5px; font-size: 0.65rem; font-weight: 900; color: #79c0ff; text-transform: uppercase; margin: 15px 0 5px 5px; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .date-header::before { content: '●'; font-size: 0.5rem; text-shadow: 0 0 5px #79c0ff;}

        .tab-content { display: none; padding: 10px 15px; animation: fadeSlideUp 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .v-chart { animation: fadeSlideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .core-tabs { display: flex; background: var(--bg-card); padding: 4px; border-radius: 12px; border: 1px solid var(--border-subtle); margin: 0 15px 15px 15px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .core-btn { flex: 1; border: none; padding: 12px 0; border-radius: 10px; font-size: 0.7rem; font-weight: 900; color: var(--text-dim); background: transparent; transition: all 0.3s ease; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }
        .core-btn.active { color: #fff; }
        .core-btn.active.blue { text-shadow: 0 0 10px rgba(121, 192, 255, 0.8); }
        .core-btn.active.red { text-shadow: 0 0 10px rgba(255,82,82,0.8); }
        #core-highlighter { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: var(--accent-blue); border-radius: 10px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s; z-index: 1; }

        .injection-hud { background: transparent; padding: 20px 0; text-align: center; }
        .monto-gigante { background: transparent; border: none; color: #79c0ff; font-size: 5rem; font-weight: 900; text-align: center; width: 100%; outline: none; padding: 0; font-family: monospace; text-shadow: 0 0 30px rgba(121, 192, 255, 0.4); transition: transform 0.2s;}
        .monto-gigante:focus { transform: scale(1.05); color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.4); }
        .terminal-form { background: var(--bg-card); border-radius: 20px; padding: 20px; border: 1px solid var(--border-subtle); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .terminal-form input[type="text"]:not(.monto-gigante), .terminal-form select, .terminal-form input[type="datetime-local"] { width: 100%; padding: 16px 14px; margin-bottom: 12px; background: var(--bg-elevated); color: white; border: 1px solid var(--border-subtle); border-radius: 10px; font-size: 0.95rem; font-weight: 600; outline: none; -webkit-appearance: none; transition: border-color 0.3s; }
        .terminal-form input:focus, .terminal-form select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 1px var(--accent-blue); }
        
        .btn-inyectar { width: 100%; padding: 20px; background: var(--accent-blue); color: white; border: none; font-weight: 900; border-radius: 12px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; box-shadow: 0 8px 20px rgba(31, 111, 235, 0.3); transition: transform 0.1s;}
        .btn-inyectar:active { transform: scale(0.96); }

        /* =======================================================
           📱 BARRA DE NAVEGACIÓN FLOTANTE (ESTILO CÁPSULA / IG)
           ======================================================= */
        .bottom-nav { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(30, 30, 35, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; display: flex; justify-content: space-around; align-items: center; padding: 8px 10px; z-index: 1000; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
        .nav-item { color: var(--text-dim); text-align: center; flex: 1; padding: 12px 0; border-radius: 30px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .nav-item span { display: none; }
        .nav-item i { display: block; font-size: 1.6rem; font-style: normal; margin: 0; transition: transform 0.2s ease; }
        .nav-item.active { color: #ffffff; background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        .nav-item.active i { transform: scale(1.1); text-shadow: none; }
        .nav-fab { background: linear-gradient(135deg, #1f6feb, #0b4abf); color: #fff; width: 50px; height: 50px; border-radius: 25px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: 300; margin: 0 5px; box-shadow: 0 5px 15px rgba(31, 111, 235, 0.5); flex-shrink: 0; border: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-fab:active { transform: scale(0.85); }

        .impact-pill { background: rgba(255, 82, 82, 0.08); border: 1px solid rgba(255,82,82,0.3); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin: 0 15px 15px 15px; box-shadow: 0 0 25px rgba(255,82,82,0.15); border-left: 5px solid var(--accent-red); }
        .mini-kpi-fugas { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; margin: 0 15px 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        
        #modal-historian { position: fixed; inset: 0; background: rgba(3, 5, 8, 0.95); z-index: 25000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; }
        .hist-box { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; width: 100%; box-shadow: 0 0 40px rgba(255, 82, 82, 0.2); overflow: hidden; border-top: 4px solid #ff5252; display: flex; flex-direction: column; max-height: 85vh;}
        .hist-header { padding: 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        .hist-body { padding: 15px; overflow-y: auto; flex-grow: 1;}
        
        .log-item { display: flex; gap: 15px; padding: 15px; border-radius: 12px; margin-bottom: 12px; background: var(--bg-elevated); border: 1px solid transparent; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        .log-icon { font-size: 1.8rem; background: rgba(0,0,0,0.2); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0;}
        .log-content { flex: 1; line-height: 1.3; }
        .log-content strong { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .log-content div.log-date { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
        .log-content span { font-family: monospace; font-size: 1.2rem; font-weight: 900; }
        .log-item.critical { border-color: rgba(255,82,82,0.4); background: linear-gradient(90deg, rgba(255,82,82,0.1), transparent); }
        .log-item.critical strong, .log-item.critical span { color: #ff5252; }
        .log-item.warning { border-color: rgba(255,152,0,0.4); background: linear-gradient(90deg, rgba(255,152,0,0.1), transparent); }
        .log-item.warning strong, .log-item.warning span { color: #ff9800; }

        #modal-dia-cero { position: fixed; inset: 0; background: rgba(3, 5, 8, 0.98); z-index: 20000; display: none; flex-direction: column; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .pv-title { font-size: 1.3rem; font-weight: 900; color: #ff9800; letter-spacing: 2px; margin: 20px 0 5px 0; text-transform: uppercase; text-align: center; }
        .pv-subtitle { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; text-align: center; margin-bottom: 20px;}
        .pv-tank-wrapper { background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border-subtle); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(255, 152, 0, 0.1); border-top: 3px solid #ff9800;}
        .pv-tank-label { display: flex; justify-content: space-between; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
        .pv-tank { width: 100%; height: 30px; background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; display: flex; border: 1px solid var(--border-subtle); }
        .pv-fill-rojo { background: linear-gradient(90deg, #b71c1c, #ff5252); height: 100%; transition: width 0.4s ease; }
        .pv-fill-naranja { background: linear-gradient(90deg, #e65100, #ff9800); height: 100%; transition: width 0.4s ease; }
        .pv-fill-verde { background: linear-gradient(90deg, #1b5e20, #2ea043); height: 100%; transition: width 0.4s ease; }
        .pv-liquidez-text { text-align: center; font-size: 2.8rem; font-weight: 900; color: var(--color-saldo); font-family: monospace; margin-top: 15px; text-shadow: 0 0 20px rgba(46, 160, 67, 0.4); }
        .pv-certeza { font-size: 0.7rem; font-weight: bold; color: var(--text-muted); text-align: center; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .pv-section-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin: 15px 0 10px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; display:flex; align-items:center; gap:5px;}
        
        .pv-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: var(--bg-card); padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border-subtle); gap:10px;}
        .pv-input-group label { font-size: 0.8rem; font-weight: 800; color: var(--text-main); flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .pv-input { background: var(--bg-elevated); border: 1px solid var(--border-subtle); color: white; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.1rem; width: 135px; text-align: right; outline: none; font-weight: bold; transition: all 0.3s;}
        .btn-estado { width: 48px; height: 48px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-panel); color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-weight: 900; flex-shrink: 0;}
        
        .btn-estado.est { border-color: rgba(255, 152, 0, 0.4); color: #ff9800; background: rgba(255, 152, 0, 0.1); }
        .btn-estado.real { border-color: rgba(31, 111, 235, 0.6); color: #79c0ff; background: rgba(31, 111, 235, 0.2); box-shadow: 0 0 8px rgba(31, 111, 235, 0.3);}
        .btn-estado.pag { border-color: rgba(46, 160, 67, 0.6); color: #2ea043; background: rgba(46, 160, 67, 0.2); box-shadow: 0 0 8px rgba(46, 160, 67, 0.3);}
        .pv-input.pagado { text-decoration: line-through; color: var(--text-muted); background: transparent; border-color: transparent;}
        
        .btn-pv-launch { width: 100%; padding: 18px; background: #ff9800; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3); }
        .btn-pv-close { width: 100%; padding: 15px; background: transparent; color: var(--text-muted); border: none; font-weight: 900; margin-top: 10px; text-transform: uppercase; }
    </style>
