<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bunker Móvil V14.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-base: #030508; --bg-card: #0d1117; --text-main: #e6edf3; --accent-green: #2ea043; --accent-red: #ff5252; }
        body { background: var(--bg-base); color: var(--text-main); margin: 0; font-family: sans-serif; overflow-x: hidden; }
        .tab-content { display: none; padding: 15px; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        .kpi-card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #21262d; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #21262d; }
        input, select { background: #010409; color: white; border: 1px solid #21262d; padding: 12px; border-radius: 8px; width: 100%; font-size: 1rem; }
        .chart-container { height: 250px; margin-bottom: 20px; }
        #login-screen { position: fixed; inset: 0; background: #030508; display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="login-screen">
    <button onclick="loginWithGoogle()" style="padding:15px 30px; font-weight:bold;">ENLAZAR CELULAR</button>
</div>

<div class="app-container" id="reportZone">
    <div id="tab-dash" class="tab-content active">
        <h3 id="mobile-date-label">RESUMEN OPERATIVO</h3>
        <div class="kpi-card"><span>BALANCE</span><h2 id="txtSaldo">$0</h2></div>
        <div class="chart-container"><canvas id="chartBurnDown"></canvas></div>
        <div class="chart-container"><canvas id="chartDiario"></canvas></div>
        <div class="chart-container"><canvas id="chartRadar"></canvas></div>
    </div>

    <div id="tab-settings" class="tab-content">
        <h3>CONFIGURACIÓN</h3>
        <div class="kpi-card">
            <label>PRESUPUESTO MENSUAL</label>
            <input type="text" id="inputSueldo" placeholder="NO ASIGNADO" inputmode="numeric">
        </div>
        <div class="kpi-card">
            <label>NAVEGADOR</label>
            <select id="navMesConceptual" onchange="aplicarCicloAlSistema()">
                <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3" selected>Abril</option><option value="4">Mayo</option>
            </select>
            <select id="navAnio" onchange="aplicarCicloAlSistema()" style="margin-top:10px;">
                <option value="2026">2026</option>
            </select>
        </div>
        <button onclick="logout()" style="width:100%; padding:15px; background:rgba(255,0,0,0.1); color:red; border:none; border-radius:8px;">CERRAR SESIÓN</button>
    </div>

    <div class="nav-bar">
        <div onclick="document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById('tab-dash').classList.add('active');">📊 PANEL</div>
        <div onclick="document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById('tab-settings').classList.add('active');">⚙️ SISTEMA</div>
    </div>
</div>

<script src="motor.js"></script>
</body>
</html>
