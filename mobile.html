<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bunker Móvil V16.5 PRO</title>
    <meta name="theme-color" content="#030508">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-base: #030508; --bg-card: #0d1117; --text-main: #e6edf3; --text-dim: #7d8590; --accent-blue: #1f6feb; --accent-red: #ff5252; --border-subtle: #21262d; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100vw; min-height: 100vh; overflow-x: hidden; }
        body { background-color: var(--bg-base); color: var(--text-main); margin: 0; padding-bottom: 100px; }
        
        .master-hud { text-align: center; padding: 20px; }
        .hud-value { font-size: 3.5rem; font-weight: 900; font-family: monospace; color: #fff; }
        
        .tab-content { display: none; padding: 10px 15px; }
        .active-tab { display: block; }
        
        .swipe-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-card { flex: 0 0 90%; scroll-snap-align: center; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 15px; }
        
        .mobile-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 15px; display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .card-body { flex: 1; }
        .card-amount { font-family: monospace; font-weight: 900; font-size: 1.1rem; }
        
        .bottom-nav { position: fixed; bottom: 0; left:0; width: 100%; background: rgba(3, 5, 8, 0.95); display: flex; border-top: 1px solid var(--border-subtle); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 0.7rem; font-weight: 800; padding: 15px 0; flex: 1; cursor: pointer; }
        .nav-item.active { color: #79c0ff; }
        .nav-fab { background: #1f6feb; color: #fff; width: 56px; height: 56px; border-radius: 28px; display: flex; justify-content: center; align-items: center; font-size: 2rem; margin-top: -28px; border: 4px solid var(--bg-base); cursor: pointer; }
        
        .terminal-form { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-subtle); }
        .terminal-form input, .terminal-form select { width: 100%; padding: 14px; margin-bottom: 12px; background: #161b22; color: white; border: 1px solid var(--border-subtle); border-radius: 8px; font-size: 1rem; outline: none; }
        
        .btn-macro { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border-subtle); background: #161b22; color: white; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        
        .modal-base { position: fixed; inset: 0; background: rgba(3,5,8,0.95); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-container { position: relative; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; width: 90%; max-width: 400px; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="login-screen" style="position: fixed; inset: 0; background: var(--bg-base); display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column;">
    <h2 style="color:#79c0ff; font-weight:900; margin-bottom: 10px;">BÚNKER SCADA</h2>
    <p style="color:var(--text-dim); margin-bottom: 40px; font-family: monospace;">[ V16.5 PRO MÓVIL ]</p>
    <button onclick="window.loginWithGoogle()" style="padding:15px 30px; border-radius:10px; font-weight:900; background: white; color: black; border: none; cursor: pointer;">INICIAR ENLACE</button>
</div>

<div class="app-container" id="reportZone" style="display: none;">
    <div style="padding: 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle);">
        <div style="font-weight:900; letter-spacing: 1px;">BÚNKER <span style="background: linear-gradient(90deg, #1f6feb, #79c0ff); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem;">V16.5</span></div>
        <div style="color:#2ea043; font-weight:bold; font-size: 0.8rem;">● ONLINE</div>
    </div>

    <div id="tab-dash" class="tab-content active-tab">
        <div class="master-hud">
            <div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing: 2px;">Saldo Maniobra</div>
            <div class="hud-value">$<span id="txtSaldo">0</span></div>
        </div>
        <div class="swipe-container">
            <div class="swipe-card"><div style="height:180px;"><canvas id="chartBurnDown"></canvas></div></div>
            <div class="swipe-card"><div style="height:180px;"><canvas id="chartDiario"></canvas></div></div>
        </div>
        <div style="font-size:0.7rem; font-weight:bold; color:#1f6feb; margin:15px 0 5px 0;">> MOVIMIENTOS RECIENTES</div>
        <div id="listaMovilDetalle"></div>
    </div>

    <div id="tab-add" class="tab-content">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-macro" onclick="window.aplicarMacro('cajero')" style="border-color:#79c0ff; color:#79c0ff;">🏧 CAJERO</button>
            <button class="btn-macro" onclick="window.aplicarMacro('super')" style="border-color:#2ea043; color:#2ea043;">🛒 SUPER</button>
            <button class="btn-macro" onclick="window.aplicarMacro('antojo')" style="border-color:#ff5252; color:#ff5252;">🍔 ANTOJO</button>
        </div>
        <div class="terminal-form">
            <input type="text" id="inputMonto" placeholder="$ 0" inputmode="numeric" oninput="window.formatearEntradaNumerica(this)" style="font-size: 2.5rem; text-align: center; color: #79c0ff; background: transparent; border: none; border-bottom: 2px solid #1f6feb; border-radius: 0;">
            <input type="text" id="inputNombre" placeholder="Descripción..." autocomplete="off">
            <select id="inputCategoria"></select>
            <select id="inputTipo" style="display:none;"><option value="Gasto">Gasto Var.</option><option value="Gasto Fijo">Fijo</option><option value="Ingreso">Ingreso</option><option value="Por Cobrar">Préstamo</option><option value="Ahorro">Ahorro</option></select>
            <select id="inputFuga" style="display:none;"><option value="100">100</option><option value="0" selected>0</option></select>
            <input type="datetime-local" id="inputFecha">
            <button onclick="window.agregarMovimiento()" style="background:#1f6feb; color:white; width:100%; padding:15px; border-radius:10px; font-weight:900; border:none; cursor:pointer;">INYECTAR</button>
        </div>
    </div>

    <div id="tab-cloud" class="tab-content">
        <h3 style="text-align: center; color: var(--text-dim);">[ NÚCLEO Y SETTINGS ]</h3>
        <button onclick="window.abrirPreVuelo()" style="width:100%; padding:20px; border-radius:12px; background:rgba(255, 152, 0, 0.1); color:#ff9800; border:1px solid rgba(255, 152, 0, 0.4); font-weight:900; margin-bottom:15px; cursor:pointer;">🚀 PRE-VUELO (DÍA CERO)</button>
        <button onclick="window.enviarReporteTelegram()" style="width:100%; padding:20px; border-radius:12px; background:rgba(0, 136, 204, 0.1); color:#0088cc; border:1px solid rgba(0, 136, 204, 0.4); font-weight:900; margin-bottom:15px; cursor:pointer;">✈️ TRANSMITIR TELEGRAM</button>
        <div style="background:var(--bg-card); border-radius: 12px; padding:20px; border:1px solid var(--border-subtle); margin-bottom:15px;">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dim); display:block; margin-bottom:10px;">TIEMPO</label>
            <div style="display:flex; gap:10px;">
                <select id="navMesConceptual" onchange="window.aplicarCicloAlSistema()" style="width:100%; padding:14px; background:#161b22; color:white; border:1px solid var(--border-subtle); border-radius:8px;"><option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3" selected>Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option></select>
                <select id="navAnio" onchange="window.aplicarCicloAlSistema()" style="width:100%; padding:14px; background:#161b22; color:white; border:1px solid var(--border-subtle); border-radius:8px;"><option value="2025">2025</option><option value="2026" selected>2026</option></select>
            </div>
        </div>
        <button onclick="window.logout()" style="width:100%; padding:20px; border-radius:12px; background:rgba(255,82,82,0.1); color:var(--accent-red); border:1px solid rgba(255,82,82,0.3); font-weight:900; cursor:pointer;">🚪 DESCONECTAR</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.switchTabApp('dash', this)">RADAR</div>
        <div class="nav-fab" onclick="window.switchTabApp('add', null)">+</div>
        <div class="nav-item" onclick="window.switchTabApp('cloud', this)">NUBE</div>
    </div>
</div>

<div id="bottom-sheet-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; cursor: pointer;" onclick="window.closeBottomSheet()"></div>
<div id="bottom-sheet" style="position:fixed; bottom:-100%; left:0; width:100%; background:var(--bg-card); border-radius:30px 30px 0 0; padding:25px 20px 40px; z-index:10000; transition:bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 1px solid var(--border-subtle);">
    <div id="sheet-title" style="font-weight:900; text-align:center; font-size:1.3rem; margin-bottom:5px;">Operación</div>
    <div id="sheet-subtitle" style="text-align:center; color:var(--text-dim); margin-bottom:25px; font-size:1.5rem; font-family:monospace; font-weight:bold;">$0</div>
    <input type="hidden" id="sheet-id-target">
    <button onclick="const id=document.getElementById('sheet-id-target').value; window.closeBottomSheet(); window.editarMovimiento(id);" style="width:100%; padding:18px; border-radius:15px; background:rgba(31,111,235,0.1); color:#79c0ff; border:1px solid rgba(31,111,235,0.2); font-weight:900; margin-bottom:12px; cursor:pointer;">✏️ RECALIBRAR</button>
    <button onclick="const id=document.getElementById('sheet-id-target').value; if(confirm('¿ELIMINAR DEL BÚNKER?')) { db.collection('movimientos').doc(id).delete().then(()=> { window.closeBottomSheet(); window.mostrarToast('REGISTRO DESTRUIDO'); }); }" style="width:100%; padding:18px; border-radius:15px; background:rgba(255,82,82,0.1); color:#ff5252; border:1px solid rgba(255,82,82,0.2); font-weight:900; margin-bottom:12px; cursor:pointer;">🗑️ DESTRUIR</button>
    <button onclick="window.closeBottomSheet()" style="width:100%; padding:15px; background:transparent; color:var(--text-dim); border:none; font-weight:800; cursor:pointer;">Cancelar</button>
</div>

<div id="modal-dia-cero" class="modal-base" style="align-items:flex-start; padding-top:40px; overflow-y:auto;">
    <div class="modal-container" style="margin:auto;">
        <button onclick="window.cerrarPreVuelo()" style="position:absolute; top:15px; right:15px; background:transparent; border:none; color:var(--text-muted); font-size:1.5rem; font-weight:bold; cursor:pointer; z-index:10;">✕</button>
        <div style="padding:20px; text-align:center; border-bottom:1px solid var(--border-subtle); border-top: 4px solid #ff9800; border-radius: 16px 16px 0 0; background:rgba(0,0,0,0.3);">
            <h2 style="color:#ff9800; margin:0; font-size:1.2rem;">DÍA CERO</h2>
            <div style="font-size:0.75rem; color:var(--text-dim); margin-top:5px;">MES <span id="pv-mes-label" style="color:#fff;"></span></div>
        </div>
        <div style="padding:20px; text-align:center;">
            <div style="font-size:0.7rem; color:var(--text-dim); margin-bottom:5px;">LIQUIDEZ NETA</div>
            <div style="font-size:3rem; font-weight:900; color:var(--color-saldo); font-family:monospace;">$<span id="pv-txt-liquidez">0</span></div>
        </div>
        <div style="padding:0 20px 20px 20px;">
            <div style="background:rgba(255,82,82,0.1); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid rgba(255,82,82,0.2);">
                <div style="color:#ff5252; font-weight:bold; font-size:0.8rem; margin-bottom:10px;">💳 CRÍTICAS</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><label style="color:var(--color-saldo); font-size:0.9rem; font-weight:bold;">Sueldo</label><input type="text" id="pv-sueldo" style="background:#161b22; border:1px solid var(--color-saldo); color:var(--color-saldo); padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><label style="font-size:0.9rem; font-weight:bold;">TC Nac.</label><input type="text" id="pv-tc-nac" style="background:#161b22; border:1px solid var(--border-subtle); color:#ff5252; padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
                <div style="display:flex; justify-content:space-between;"><label style="font-size:0.9rem; font-weight:bold;">TC Int. (USD)</label><input type="text" id="pv-tc-int" style="background:#161b22; border:1px solid var(--border-subtle); color:#ff5252; padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" placeholder="0" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
                <div style="text-align:right; font-size:0.7rem; color:#ff5252; font-family:monospace; margin-top:5px;" id="pv-tc-int-clp">~ $0 CLP</div>
            </div>
            <div style="background:rgba(163,113,247,0.1); padding:15px; border-radius:12px; border:1px solid rgba(163,113,247,0.2);">
                <div style="color:var(--color-infra); font-weight:bold; font-size:0.8rem; margin-bottom:10px;">🏢 ESTRUCTURAL</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><label style="font-size:0.9rem; font-weight:bold;">Arriendo</label><input type="text" id="pv-arriendo" value="330.000" style="background:#161b22; border:1px solid var(--border-subtle); color:white; padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><label style="font-size:0.9rem; font-weight:bold;">UDEC</label><input type="text" id="pv-udec" value="48.000" style="background:#161b22; border:1px solid var(--border-subtle); color:white; padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
                <div style="display:flex; justify-content:space-between;"><label style="font-size:0.9rem; font-weight:bold;">CAE</label><input type="text" id="pv-cae" value="38.742" style="background:#161b22; border:1px solid var(--border-subtle); color:white; padding:6px; border-radius:6px; width:100px; text-align:right; font-weight:bold;" oninput="window.formatearEntradaNumerica(this); window.calcularDiaCero();"></div>
            </div>
        </div>
        <div style="padding:15px; background:rgba(0,0,0,0.3); border-top:1px solid var(--border-subtle);"><button onclick="window.ejecutarArranque()" style="width:100%; background:#ff9800; color:black; padding:15px; border-radius:8px; font-weight:900; border:none; cursor:pointer;">INYECTAR MATRIZ</button></div>
    </div>
</div>

<script>
    window.switchTabApp = function(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(d => { d.classList.remove('active-tab'); });
        document.getElementById('tab-' + tabId).classList.add('active-tab');
        if(element) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); element.classList.add('active'); }
        if (tabId === 'add') { let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); document.getElementById('inputFecha').value = now.toISOString().slice(0,16); }
        window.scrollTo(0,0);
    }
    window.openBottomSheet = function(id, n, m) { document.getElementById('sheet-title').innerText = n; document.getElementById('sheet-subtitle').innerText = "$" + m.toLocaleString('es-CL'); document.getElementById('sheet-id-target').value = id; const overlay = document.getElementById('bottom-sheet-overlay'); const sheet = document.getElementById('bottom-sheet'); overlay.style.display = 'block'; setTimeout(() => { overlay.style.opacity = '1'; sheet.style.bottom = '0'; }, 10); };
    window.closeBottomSheet = function() { const overlay = document.getElementById('bottom-sheet-overlay'); const sheet = document.getElementById('bottom-sheet'); sheet.style.bottom = '-100%'; overlay.style.opacity = '0'; setTimeout(()=> overlay.style.display = 'none', 300); };
</script>
<script src="motor.js"></script>
</body>
</html>
