<script>
    // 🟢 V14.3: LÓGICA DE TRI-CORE Y MOTOR DE RENDERIZADO MÓVIL 🟢
    
    function switchDualCore(viewId, el) {
        document.querySelectorAll('.core-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('blue'); b.classList.remove('red'); b.classList.remove('purple'); });
        el.classList.add('active');
        const highlighter = document.getElementById('core-highlighter');
        
        document.getElementById('vista-efectivo').style.display = 'none';
        document.getElementById('vista-tc').style.display = 'none';
        document.getElementById('vista-patrimonio').style.display = 'none';

        if (viewId === 'efectivo') {
            el.classList.add('blue'); highlighter.style.transform = 'translateX(0)'; highlighter.style.background = 'var(--accent-blue)'; document.getElementById('vista-efectivo').style.display = 'block';
        } else if (viewId === 'tc') {
            el.classList.add('red'); highlighter.style.transform = 'translateX(100%)'; highlighter.style.background = 'var(--accent-red)'; document.getElementById('vista-tc').style.display = 'block';
        } else if (viewId === 'patrimonio') {
            el.classList.add('purple'); highlighter.style.transform = 'translateX(200%)'; highlighter.style.background = '#79c0ff'; document.getElementById('vista-patrimonio').style.display = 'block';
        }
    }

    function switchTabApp(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(d => { d.style.display = 'none'; });
        document.getElementById('tab-' + tabId).style.display = 'block';
        if(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
        if (tabId === 'add' && !document.getElementById('editId').value) {
            let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('inputFecha').value = now.toISOString().slice(0,16);
            document.getElementById('inputFuga').value = "0";
            document.getElementById('boxCuotas').style.display = 'none'; 
            document.getElementById('inputNombre').focus();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 🟢 EL MOTOR MÓVIL RECUPERADO 🟢
    document.addEventListener("DOMContentLoaded", () => {
        window.renderizarListas = function(sueldoBase, filtroBuscador) {
            let datos = [...datosMesGlobal].filter(x => x.catV !== 'Gasto Tarjeta de Crédito'); 
            if (filtroBuscador) datos = datos.filter(x => x.nombre?.toLowerCase().includes(filtroBuscador) || x.catV.toLowerCase().includes(filtroBuscador));
            datos.sort((a, b) => { let vA = a[currentSort.column], vB = b[currentSort.column]; if (vA < vB) return currentSort.direction === 'asc' ? -1 : 1; if (vA > vB) return currentSort.direction === 'asc' ? 1 : -1; return 0; });
            const contenedorMovil = document.getElementById('listaMovilDetalle');
            if (!contenedorMovil) return;
            if(datos.length === 0) { contenedorMovil.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i>📡</i><br>MATRIZ SIN DATOS</div>`; return; }

            let htmlMovil = ''; let currentDayGroup = ""; let now = new Date(); now.setHours(0,0,0,0); let yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
            datos.forEach((x) => {
                const d = new Date(x.fechaISO); let dClean = new Date(d); dClean.setHours(0,0,0,0);
                const dateStr = d.toLocaleDateString('es-CL'), timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                if (currentSort.column === 'fechaISO' && currentSort.direction === 'desc' && dateStr !== currentDayGroup) {
                    let labelText = dateStr;
                    if (dClean.getTime() === now.getTime()) labelText = "HOY"; else if (dClean.getTime() === yesterday.getTime()) labelText = "AYER"; else { const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"]; labelText = `${d.getDate()} ${meses[d.getMonth()]}`; }
                    htmlMovil += `<div class="date-header">${labelText}</div>`; currentDayGroup = dateStr;
                }

                const em = catEmojis[x.catV] || "❓", colorMonto = x.esIn ? "var(--accent-green)" : x.esNeutro ? "#d29922" : "var(--text-main)", iconoVisual = obtenerIconoVisual(x.nombre, em);
                const nombreSeguro = x.nombre || "Dato no identificado", montoSeguro = (typeof x.monto === 'number' && !isNaN(x.monto)) ? x.monto : 0;
                let styleExtra = x.catV === 'Dopamina & Antojos' ? 'background: linear-gradient(90deg, rgba(255,255,255,0.01) 30%, rgba(255, 82, 82, 0.15) 100%) !important; border-right: 2px solid var(--accent-red) !important;' : '';
                const clickAction = typeof openBottomSheet === 'function' ? `openBottomSheet('${x.firestoreId}', '${nombreSeguro.replace(/'/g, "\\'")}', ${montoSeguro})` : `editarMovimiento('${x.firestoreId}')`;
                
                htmlMovil += `
                <div class="mobile-card" onclick="${clickAction}" style="${styleExtra}">
                    <div style="width: 46px; height: 46px; margin-right: 12px; background: var(--bg-elevated); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border-subtle); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);">${iconoVisual}</div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight:bold; font-size:0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); letter-spacing: 0.5px;">${nombreSeguro}</div>
                        <div style="font-size:0.7rem; color:var(--text-dim); margin-top:3px;">${timeStr} • ${x.catV.replace(' & ','&')}</div>
                    </div>
                    <div style="font-weight:900; color:${colorMonto}; flex-shrink: 0; font-size:1.15rem; font-family:monospace;">${x.esIn?'+':(x.esNeutro?'=':'-')}$${Math.round(montoSeguro/1000)}k</div>
                </div>`;
            });
            contenedorMovil.innerHTML = htmlMovil;
        };

        window.renderizarTablaTC = function() {
            const tbody = document.getElementById("listaMovilTC"); if (!tbody) return;
            if (datosTCGlobal.length === 0) { tbody.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i>📡</i><br>MATRIZ TC SIN DATOS</div>`; let boxImpacto = document.getElementById('boxImpactoTC'); if(boxImpacto) boxImpacto.style.display = 'none'; return; }

            let htmlMovil = '', sumaProximoMes = 0, fechaHoy = new Date(), proximoMes = fechaHoy.getMonth() + 1, proximoAnio = fechaHoy.getFullYear();
            if (proximoMes > 11) { proximoMes = 0; proximoAnio++; }

            datosTCGlobal.forEach(doc => {
                let fechaObj = new Date(doc.mesCobro), mesTxt = fechaObj.toLocaleString('es-CL', { month: 'short', year: 'numeric' }).toUpperCase();
                if (fechaObj.getMonth() === proximoMes && fechaObj.getFullYear() === proximoAnio) sumaProximoMes += doc.monto;
                htmlMovil += `
                <div class="mobile-card" style="margin-bottom:6px; border-radius:12px !important; background: var(--bg-card) !important; padding: 14px 15px !important; border: 1px solid rgba(255,82,82,0.1) !important;">
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight:bold; font-size:0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main);">${doc.nombre}</div>
                        <div style="font-size:0.7rem; color:var(--accent-red); margin-top:3px; font-weight:800; letter-spacing: 0.5px;">${mesTxt} (${doc.cuota})</div>
                    </div>
                    <div style="font-weight:900; color:var(--text-main); flex-shrink: 0; font-size:1.15rem; font-family:monospace;">$${doc.monto.toLocaleString('es-CL')}</div>
                </div>`;
            });
            tbody.innerHTML = htmlMovil;

            let mesNombreStr = new Date(proximoAnio, proximoMes, 1).toLocaleString('es-CL', { month: 'long' }).toUpperCase();
            let boxImpacto = document.getElementById('boxImpactoTC');
            if (boxImpacto) {
                if (sumaProximoMes > 0) { boxImpacto.style.display = 'flex'; document.getElementById('lblImpactoMes').innerText = `${mesNombreStr}`; document.getElementById('txtImpactoMonto').innerText = `$${sumaProximoMes.toLocaleString('es-CL')}`; } else { boxImpacto.style.display = 'none'; }
            }
        };
    });

    function openBottomSheet(id, n, m) { document.getElementById('sheet-title').innerText = n; document.getElementById('sheet-subtitle').innerText = "$" + m.toLocaleString('es-CL'); document.getElementById('sheet-id-target').value = id; const overlay = document.getElementById('bottom-sheet-overlay'); const sheet = document.getElementById('bottom-sheet'); overlay.style.display = 'block'; setTimeout(() => { overlay.style.opacity = '1'; sheet.style.bottom = '0'; }, 10); }
    function closeBottomSheet() { const overlay = document.getElementById('bottom-sheet-overlay'); const sheet = document.getElementById('bottom-sheet'); sheet.style.bottom = '-100%'; overlay.style.opacity = '0'; setTimeout(()=> overlay.style.display = 'none', 300); }
</script>
