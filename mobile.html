<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bunker Móvil HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #f0f6fc; --blue: #1f6feb; --orange: #ff9800; --red: #ff5252; --dim: #8b949e;}
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .top-bar { padding: 45px 20px 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
        .hud { text-align: center; padding: 15px; font-size: 3rem; font-weight: 900; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .mobile-card { background: transparent; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .date-header { font-size: 0.65rem; font-weight: 900; color: var(--dim); padding: 15px 10px 5px; text-transform: uppercase; letter-spacing: 1px;}
        
        /* SEGMENTED CONTROL TÁCTICO */
        .chart-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; }
        .chart-tab-btn { flex: 1; border: none; padding: 10px 2px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; color: var(--dim); background: transparent; transition: 0.2s; text-transform: uppercase; }
        .chart-tab-btn.active { background: var(--blue); color: white; box-shadow: 0 4px 10px rgba(31, 111, 235, 0.3); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(11,14,20,0.9); display: flex; justify-content: space-around; padding: 10px 0 30px; border-top: 1px solid #30363d; backdrop-filter: blur(10px); z-index: 1000;}
        .nav-item { color: var(--dim); font-size: 0.6rem; font-weight: 800; text-align: center; text-transform: uppercase;}
        .nav-item.active { color: white; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; font-style: normal;}
        
        .compact-form { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #21262d; border: 1px solid #30363d; color: white; border-radius: 10px; font-size: 0.95rem; -webkit-appearance: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">🛡️<h2 style="color:white; margin:20px 0;">BÚNKER SCADA</h2><button onclick="loginWithGoogle()" style="padding:15px 30px; border-radius:30px; font-weight:bold;">AUTENTICAR</button></div>

<div class="app-container" id="reportZone">
    <div class="top-bar"><b>SCADA MÓVIL V8.0</b><span id="user-display"></span></div>

    <div id="tab-dash" class="tab-content" style="display:block;">
        <div class="hud">$<span id="txtSaldo">0</span></div>
        <div id="listaMovilDetalle"></div>
    </div>

    <div id="tab-trend" class="tab-content">
        <div class="chart-tabs">
            <button class="chart-tab-btn active" onclick="switchSubChart('vBD', this)">Burn</button>
            <button class="chart-tab-btn" onclick="switchSubChart('vDI', this)">Pulso</button>
            <button class="chart-tab-btn" onclick="switchSubChart('vPA', this)">Pareto</button>
            <button class="chart-tab-btn" onclick="switchSubChart('vRA', this)">Radar</button>
        </div>
        
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="date" id="filtroDesde" style="margin:0; padding:8px; font-size:0.75rem;" onchange="actualizarDashboard()">
            <input type="date" id="filtroHasta" style="margin:0; padding:8px; font-size:0.75rem;" onchange="actualizarDashboard()">
        </div>

        <div id="vBD" class="v-chart" style="display:block; background:var(--card); padding:15px; border-radius:15px;">
            <div style="height:220px;"><canvas id="chartBurnDown"></canvas></div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-top:10px; font-weight:bold;">
                <span>TRAMO: <span id="txtGastoTramo" style="color:var(--red)">$0</span></span>
                <span>PROM: <span id="txtPromedioZoom" style="color:var(--orange)">$0</span></span>
            </div>
        </div>
        <div id="vDI" class="v-chart" style="display:none; background:var(--card); border-radius:15px; padding:15px; height:280px;"><canvas id="chartDiario"></canvas></div>
        <div id="vPA" class="v-chart" style="display:none; background:var(--card); border-radius:15px; padding:15px; height:280px;"><canvas id="chartPareto"></canvas></div>
        <div id="vRA" class="v-chart" style="display:none; background:var(--card); border-radius:15px; padding:15px; height:280px;"><canvas id="chartRadar"></canvas></div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="compact-form">
            <input type="text" id="inputMonto" placeholder="$ 0" style="font-size:2.5rem; text-align:center; font-weight:900; background:transparent; border:none;" oninput="formatearEntradaNumerica(this)">
            <input type="text" id="inputNombre" placeholder="Descripción">
            <div style="display:flex; gap:8px;">
                <select id="inputTipo" style="flex:1;"><option value="Gasto">Var.</option><option value="Gasto Fijo">Fijo</option><option value="Ingreso">In.</option></select>
                <input type="datetime-local" id="inputFecha" style="flex:1.5;">
            </div>
            <div style="display:flex; gap:8px;">
                <select id="inputCategoria" style="flex:2;"></select>
                <select id="inputFuga" style="flex:1;"><option value="0">0%</option><option value="100">100%</option></select>
            </div>
            <button onclick="agregarMovimiento()" style="width:100%; padding:18px; background:#3fb950; border:none; font-weight:900; border-radius:12px; color:black; text-transform:uppercase;">Registrar</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTabApp('dash', this)"><i>📡</i>Radar</div>
        <div class="nav-item" onclick="switchTabApp('trend', this)"><i>📈</i>Tren</div>
        <div class="nav-item" onclick="switchTabApp('add', this)"><i>➕</i>Nuevo</div>
        <div class="nav-item" onclick="triggerSync()"><i>🔄</i>Sync</div>
    </nav>
</div>
<script>
    function switchTabApp(t, el) { 
        document.querySelectorAll('.tab-content').forEach(d => d.style.display='none');
        document.getElementById('tab-'+t).style.display='block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(t==='trend') setTimeout(()=> { [chartBD, chartDiario, chartP, chartRadar].forEach(c => c && c.resize()); },10);
    }
    function switchSubChart(id, el) {
        document.querySelectorAll('.v-chart').forEach(v => v.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.chart-tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    function openBottomSheet(id, n, m) { document.getElementById('editId').value = id; switchTabApp('add'); }
</script>
<script src="motor.js"></script>
</body>
</html>
